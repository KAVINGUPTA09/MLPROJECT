services:
  - type: web
    name: fraud-detection-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "src.app:app"
    autoDeploy: true

  - type: web
    name: fraud-detection-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true